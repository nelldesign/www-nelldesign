<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canva Projects — Nell Design</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 6rem; }

    /* ── Page header ── */
    .page-header {
      padding: 3rem 5vw 3.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-family: var(--display);
      font-size: clamp(1.8rem, 4vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .page-header p {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── Section ── */
    .section {
      padding: 4rem 5vw;
      border-bottom: 1px solid var(--border);
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .section-header h2 {
      font-family: var(--display);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .section-header .count {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }

    /* ── Projects grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.25rem;
    }

    /* ── Project card ── */
    .project-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .3s;
    }
    .project-card:hover { border-color: var(--gold); }
    .thumb-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #111;
    }
    .thumb-wrap.portrait { aspect-ratio: 3/4; }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }
    .project-card:hover .thumb-wrap img { transform: scale(1.04); }
    .card-info {
      padding: 0.85rem 1rem;
    }
    .card-title {
      font-size: 0.73rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      color: var(--text);
      margin-bottom: 0.25rem;
      line-height: 1.4;
    }
    .card-meta {
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .pages-count {
      display: inline-block;
      font-size: 0.54rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-top: 0.45rem;
    }

    /* ══════════════════════════════════════
       LIGHTBOX
    ══════════════════════════════════════ */
    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(10, 9, 8, 0.97);
      flex-direction: column;
    }
    .lb-overlay.open { display: flex; }

    /* Header bar */
    .lb-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .lb-title {
      font-family: var(--display);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }
    .lb-counter {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.14em;
    }
    .lb-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      transition: border-color .25s, color .25s;
    }
    .lb-close:hover { border-color: var(--gold); color: var(--gold); }

    /* Main image area */
    .lb-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 1rem 4.5rem;
    }
    .lb-img-wrap {
      max-width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-img-wrap img {
      max-width: 100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display: block;
      transition: opacity .2s ease;
    }

    /* Prev / Next arrows */
    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.2rem;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .25s, color .25s;
    }
    .lb-arrow:hover { border-color: var(--gold); color: var(--gold); }
    .lb-arrow.prev { left: 1rem; }
    .lb-arrow.next { right: 1rem; }
    .lb-arrow:disabled { opacity: 0.2; pointer-events: none; }

    /* Thumbnail strip */
    .lb-strip {
      flex-shrink: 0;
      display: flex;
      gap: 0.4rem;
      padding: 0.75rem 1.5rem;
      overflow-x: auto;
      border-top: 1px solid var(--border);
      scroll-behavior: smooth;
    }
    .lb-strip::-webkit-scrollbar { height: 3px; }
    .lb-strip::-webkit-scrollbar-thumb { background: var(--border); }
    .lb-thumb {
      flex-shrink: 0;
      width: 56px;
      height: 42px;
      object-fit: cover;
      border: 1px solid var(--border);
      cursor: pointer;
      opacity: 0.45;
      transition: opacity .2s, border-color .2s;
    }
    .lb-thumb.active { opacity: 1; border-color: var(--gold); }
    .lb-thumb:hover { opacity: 0.85; }

    @media (max-width: 768px) {
      .projects-grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
      .lb-main { padding: 0.75rem 3rem; }
      .lb-arrow { width: 2.2rem; height: 2.2rem; font-size: 1rem; }
      .lb-arrow.prev { left: 0.3rem; }
      .lb-arrow.next { right: 0.3rem; }
      .lb-thumb { width: 44px; height: 33px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="nav-logo">Nell Design</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Domů</a></li>
      <li><a href="about.html">O mně</a></li>
      <li><a href="work.html">Práce</a></li>
      <li><a href="galerie.html">Galerie</a></li>
      <li><a href="kids.html">For Kids</a></li>
      <li><a href="contact.html">Kontakt</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span></button>
  </nav>

  <div class="page-header">
    <h1>Canva Projects</h1>
    <p>21 projektů · 172 stránek · klik = celá sada</p>
  </div>

  <!-- ═══ PRÁCE ═══ -->
  <section class="section">
    <div class="section-header">
      <h2>Práce</h2>
      <span class="count">klientské projekty</span>
    </div>
    <div class="projects-grid" id="grid-prace"></div>
  </section>

  <!-- ═══ GALERIE ═══ -->
  <section class="section">
    <div class="section-header">
      <h2>Galerie</h2>
      <span class="count">vizuální + tiskové práce</span>
    </div>
    <div class="projects-grid" id="grid-galerie"></div>
  </section>

  <!-- ══════════════ LIGHTBOX ══════════════ -->
  <div class="lb-overlay" id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-header">
      <span class="lb-title" id="lb-title"></span>
      <span class="lb-counter" id="lb-counter"></span>
      <button class="lb-close" id="lb-close" aria-label="Zavřít">✕</button>
    </div>
    <div class="lb-main">
      <button class="lb-arrow prev" id="lb-prev" aria-label="Předchozí">‹</button>
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="">
      </div>
      <button class="lb-arrow next" id="lb-next" aria-label="Další">›</button>
    </div>
    <div class="lb-strip" id="lb-strip"></div>
  </div>

  <footer>
    <span class="footer-logo">Nell Design</span>
    <span class="footer-copy">© 2025</span>
  </footer>

  <script>
    /* ── Project data ── */
    const projects = [
      // Práce
      { slug:'fenix-brand',        title:'FENIX JERKY — brand',        pages:34, meta:'packaging + identity',   section:'prace' },
      { slug:'fenix-etikety',      title:'FENIX JERKY — etikety',      pages:23, meta:'9×6 cm labels',          section:'prace' },
      { slug:'fenix-ig',           title:'FENIX JERKY — Instagram',     pages:3,  meta:'social media · feed',    section:'prace' },
      { slug:'mattoni-cz',         title:'Café Mattoni — CZ menu',      pages:13, meta:'menu design',            section:'prace', portrait:true },
      { slug:'mattoni-en',         title:'Café Mattoni — EN menu',      pages:12, meta:'menu design',            section:'prace', portrait:true },
      { slug:'mattoni-de',         title:'Café Mattoni — DE menu',      pages:12, meta:'menu design',            section:'prace', portrait:true },
      { slug:'queens-menu',        title:"QUEEN'S MENU",                pages:2,  meta:'restaurant menu',        section:'prace', portrait:true },
      { slug:'tmf-caje',           title:'TMF čaje',                    pages:11, meta:'brand · packaging',      section:'prace' },
      { slug:'riva-del-garda',     title:'Riva del Garda — manuál',     pages:9,  meta:'brand manual',           section:'prace', portrait:true },
      { slug:'prima-vizus',        title:'Prima Vizus Medical',         pages:3,  meta:'prezentace',             section:'prace' },
      // Galerie
      { slug:'wedding-newspaper',  title:'WEDDING NEWSPAPER',           pages:9,  meta:'tisková grafika',        section:'galerie', portrait:true },
      { slug:'charlotte-alex',     title:'Charlotte & Alex',            pages:2,  meta:'svatební grafika',       section:'galerie', portrait:true },
      { slug:'kristyna-filip',     title:'Kristýna & Filip',            pages:4,  meta:'svatební grafika',       section:'galerie', portrait:true },
      { slug:'wedding-jmenovky',   title:'Wedding jmenovky',            pages:8,  meta:'tisková grafika',        section:'galerie' },
      { slug:'kviff',              title:'KVIFF',                       pages:1,  meta:'festivalová grafika',    section:'galerie', portrait:true },
      { slug:'graphic',            title:'Graphic',                     pages:10, meta:'grafické experimenty',   section:'galerie' },
      { slug:'vizitka-marilyn',    title:'Vizitka — Marilyn',           pages:6,  meta:'business card',          section:'galerie' },
      { slug:'byt-pasavovi',       title:'BYT PAŠAVOVI',                pages:5,  meta:'interiér · prezentace',  section:'galerie' },
      { slug:'apartment-estepona', title:'Apartment Guide Estepona',    pages:5,  meta:'editorial · interiér',   section:'galerie', portrait:true },
      { slug:'letbalonem',         title:'Letbalonem',                  pages:1,  meta:'plakát · event',         section:'galerie' },
      { slug:'kalendar-2026',      title:'Kalendář 2026',               pages:25, meta:'tisk · print design',    section:'galerie' },
    ];

    /* ── Build grids ── */
    const gridPrace   = document.getElementById('grid-prace');
    const gridGalerie = document.getElementById('grid-galerie');

    projects.forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.dataset.idx = idx;
      card.innerHTML = `
        <div class="thumb-wrap${p.portrait ? ' portrait' : ''}">
          <img src="assets/canva/${p.slug}/page-01.jpg"
               alt="${p.title}"
               loading="lazy">
        </div>
        <div class="card-info">
          <p class="card-title">${p.title}</p>
          <p class="card-meta">${p.meta}</p>
          <span class="pages-count">${p.pages} ${p.pages === 1 ? 'strana' : p.pages < 5 ? 'strany' : 'stran'}</span>
        </div>`;
      card.addEventListener('click', () => openLightbox(idx));
      (p.section === 'prace' ? gridPrace : gridGalerie).appendChild(card);
    });

    /* ── Lightbox state ── */
    let curProject = null;
    let curPage    = 0;

    const lb        = document.getElementById('lightbox');
    const lbTitle   = document.getElementById('lb-title');
    const lbCounter = document.getElementById('lb-counter');
    const lbImg     = document.getElementById('lb-img');
    const lbStrip   = document.getElementById('lb-strip');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');
    const lbClose   = document.getElementById('lb-close');

    function pageUrl(p, n) {
      return `assets/canva/${p.slug}/page-${String(n+1).padStart(2,'0')}.jpg`;
    }

    function setPage(n) {
      const p = curProject;
      curPage = n;
      lbImg.style.opacity = 0;
      lbImg.src = pageUrl(p, n);
      lbImg.onload = () => { lbImg.style.opacity = 1; };
      lbCounter.textContent = `${n+1} / ${p.pages}`;
      lbPrev.disabled = n === 0;
      lbNext.disabled = n === p.pages - 1;
      // Sync strip
      lbStrip.querySelectorAll('.lb-thumb').forEach((t,i) => t.classList.toggle('active', i === n));
      // Scroll strip so active thumb is visible
      const active = lbStrip.children[n];
      if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest', behavior: 'smooth' });
    }

    function openLightbox(idx) {
      curProject = projects[idx];
      lbTitle.textContent = curProject.title;
      // Build thumbnail strip
      lbStrip.innerHTML = '';
      for (let i = 0; i < curProject.pages; i++) {
        const t = document.createElement('img');
        t.className = 'lb-thumb';
        t.src       = pageUrl(curProject, i);
        t.alt       = `Strana ${i+1}`;
        t.loading   = 'lazy';
        t.addEventListener('click', () => setPage(i));
        lbStrip.appendChild(t);
      }
      setPage(0);
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => curPage > 0 && setPage(curPage - 1));
    lbNext.addEventListener('click', () => curPage < curProject.pages - 1 && setPage(curPage + 1));

    // Keyboard
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')  lbPrev.disabled || setPage(curPage - 1);
      if (e.key === 'ArrowRight') lbNext.disabled || setPage(curPage + 1);
    });

    // Click backdrop (outside img)
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    /* ── Nav ── */
    const nav    = document.getElementById('nav');
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60), { passive: true });
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });

    /* ── Cursor ── */
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      cur.style.left  = e.clientX + 'px';
      cur.style.top   = e.clientY + 'px';
      rx += (e.clientX - rx) * 0.12;
      ry += (e.clientY - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
    });
    (function animate() { requestAnimationFrame(animate); })();
  </script>
</body>
</html>
