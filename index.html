<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nell Design</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      min-height: 100vh;
    }

    .logo {
      max-width: 600px;
      width: 90%;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="logo.png" alt="Nell Design – Design that works with intent">
  </div>
</body>
</html>
